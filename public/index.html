<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fxzz Store | تسجيل الدخول</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-page="login">
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>
  <div class="animated-bg"><span class="grid-lines"></span></div>

  <main class="login-shell container">
    <section class="login-panel glass">
      <div class="section-head login-brand-head">
        <span class="brand-mini-badge">Online</span>
        <h1 class="fxzz-logo">Fxzz Store</h1>
        <p class="login-subtitle">تسجيل دخول</p>
      </div>

      <form id="loginForm" class="form-stack">
        <div class="input-group">
          <label for="email">البريد الإلكتروني</label>
          <input type="email" id="email" placeholder="name@example.com" autocomplete="username" />
        </div>

        <div class="input-group">
          <label for="password">كلمة المرور</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button class="secondary-btn small-btn" type="button" id="toggleLoginPassword">إظهار</button>
          </div>
        </div>

        <button class="primary-btn" type="submit">الدخول إلى المنصة</button>
      </form>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/js/app.js"></script>
</body>
</html>
